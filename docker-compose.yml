version: '3.8'

services:
  search-api:
    build:
      context: . 
      dockerfile: Dockerfile
    
    container_name: api-container
    
    ports:
      - "8833:8000"  
    
    volumes:
      - .:/app  
    
    env_file:
      - .env
    
    restart: always
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s      
      timeout: 10s       
      retries: 3        
      start_period: 40s  
    
    networks:
      - search-network

networks:
  search-network:
    driver: bridge
